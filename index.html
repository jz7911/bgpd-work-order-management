function startInsp(id){
  inspActive=DB.templates.find(function(t){return t.id===id;});
  inspResults={};inspAsset='';inspInspector='';
  renderPage('inspections');
}

function buildInspForm(){
  var t=inspActive;
  var items=t.items||[];
  var pfItems=items.filter(function(it){return it.type==='pf';});
  var failCount=pfItems.filter(function(it){return inspResults[it.id]==='fail';}).length;
  var passCount=pfItems.filter(function(it){return inspResults[it.id]==='pass';}).length;
  var pct=pfItems.length>0?Math.round(passCount/pfItems.length*100):0;

  var assetOpts='<option value="">Select location…</option>';
  DB.assets.forEach(function(a){assetOpts+='<option value="'+a.id+'"'+(inspAsset===a.id?' selected':'')+'>'+esc(a.name)+'</option>';});

  var b='<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">';
  b+='<button class="btn btn-ghost btn-sm" onclick="inspActive=null;renderPage(\'inspections\')">← Back</button>';
  b+='<div style="flex:1"><h2 style="font-size:18px;font-weight:800">'+esc(t.name)+'</h2>';
  b+='<div style="font-size:13px;color:var(--text3);margin-top:2px">'+pfItems.length+' checkpoints'+( failCount>0?' · <span style="color:var(--red);font-weight:600">'+failCount+' failing</span>':passCount>0?' · <span style="color:var(--green-m);font-weight:600">'+passCount+' passing</span>':'')+'</div></div>';
  if(pfItems.length>0){
    b+='<div style="text-align:center"><div style="font-size:24px;font-weight:800;font-family:var(--mono);color:'+(failCount>0?'var(--red)':passCount===pfItems.length?'var(--green-m)':'var(--text)')+'">'+pct+'%</div><div style="font-size:11px;color:var(--text3)">Complete</div></div>';
  }
  b+='</div>';

  b+='<div class="two-col" style="margin-bottom:16px">';
  b+='<div class="fg"><label class="flabel">Location *</label><select class="fsel" id="insp-asset" onchange="inspAsset=this.value">'+assetOpts+'</select></div>';
  b+='<div class="fg"><label class="flabel">Inspector Name *</label><input type="text" class="finput" id="insp-name" placeholder="Your name…" value="'+esc(inspInspector)+'" oninput="inspInspector=this.value"></div>';
  b+='</div>';

  b+='<div class="dsec"><div class="dsec-hdr">Checklist Items</div><div class="dsec-body">';
  items.forEach(function(it){
    b+='<div class="ci-row">';
    b+='<div style="flex:1;font-size:14px;line-height:1.5;padding-right:12px"><strong>'+esc(it.label)+'</strong></div>';
    if(it.type==='pf'){
      var r=inspResults[it.id];
      b+='<div style="display:flex;gap:8px;flex-shrink:0">';
      b+='<button class="btn btn-sm '+(r==='pass'?'btn-success':'btn-ghost')+'" onclick="setInspRes(\''+it.id+'\',\'pass\')" style="min-width:72px">'+(r==='pass'?'✓ Pass':'Pass')+'</button>';
      b+='<button class="btn btn-sm '+(r==='fail'?'btn-danger':'btn-ghost')+'" onclick="setInspRes(\''+it.id+'\',\'fail\')" style="min-width:72px">'+(r==='fail'?'✗ Fail':'Fail')+'</button>';
      b+='</div>';
    } else {
      b+='<input type="text" class="finput" style="width:220px;font-size:13px;padding:8px 12px" placeholder="Notes…" value="'+esc(inspResults[it.id]||'')+'" oninput="inspResults[\''+it.id+'\']=this.value">';
    }
    b+='</div>';
  });
  b+='<div class="fg" style="margin-top:16px"><label class="flabel">Overall Notes</label><textarea class="ftextarea" id="insp-notes" style="min-height:70px" placeholder="Any additional observations, photos taken, next steps…"></textarea></div>';
  b+='</div></div>';

  var allAnswered=pfItems.every(function(it){return inspResults[it.id];});
  var canSubmit=allAnswered&&inspAsset&&inspInspector;
  b+='<button class="btn btn-primary btn-lg btn-full" style="margin-top:8px" onclick="submitInsp()" '+(canSubmit?'':'disabled')+'>'+( canSubmit?'Submit Inspection →':(!inspAsset?'Select a location first':(!inspInspector?'Enter your name':!allAnswered?'Answer all checkpoints first':'Submit')))+'</button>';
  return b;
}

function setInspRes(id,v){
  inspResults[id]=v;
  renderPage('inspections');
  // scroll to preserve position
}

function submitInsp(){
  var t=inspActive;
  var items=(t.items||[]).map(function(it){return Object.assign({},it,{value:inspResults[it.id]||''},it);});
  var failed=items.filter(function(it){return it.type==='pf'&&it.value==='fail';});
  var passed=failed.length===0;
  var notes=((document.getElementById('insp-notes')||{}).value||'').trim();
  DB.inspections=DB.inspections||[];
  DB.inspections.push({id:uid(),tid:t.id,asset:inspAsset,inspector:inspInspector,items:items,passed:passed,notes:notes,ts:nowISO()});
  var issNum=null;
  if(!passed){
    var assetObj=DB.assets.find(function(a){return a.id===inspAsset;});
    var newI={id:uid(),num:DB._num++,type:'inspection',asset:inspAsset,cat:null,summary:'Inspection Failure: '+t.name,desc:'Failed at '+(assetObj?assetObj.name:'unknown')+'.\n\nFailed items:\n'+failed.map(function(f){return'• '+f.label;}).join('\n')+(notes?'\n\nNotes: '+notes:''),loc:'',status:'open',prio:'high',assigned:null,by:inspInspector,due:null,closed:null,lhrs:0,lcost:0,pcost:0,photos:[],created:nowISO()};
    DB.issues.unshift(newI);
    DB.history.push({id:uid(),iid:newI.id,by:inspInspector,from:null,to:'open',note:'Auto-generated from failed inspection',ts:nowISO()});
    issNum=newI.num;
  }
  saveDB(DB);
  inspActive=null;
  updateCounts();
  // Result screen
  var b='<div style="text-align:center;padding:60px 20px;max-width:500px;margin:0 auto">';
  b+='<div style="font-size:80px;margin-bottom:16px">'+(passed?'✅':'⚠️')+'</div>';
  b+='<h2 style="font-size:26px;font-weight:800;margin-bottom:10px">'+(passed?'All Clear!':'Items Failed')+'</h2>';
  if(passed){
    b+='<p style="font-size:16px;color:var(--text3);line-height:1.6">All '+items.filter(function(it){return it.type==='pf';}).length+' items passed. Inspection logged.</p>';
  } else {
    b+='<div class="alert alert-danger" style="text-align:left;margin-top:16px"><span class="alert-icon">⚠️</span><div><strong>'+failed.length+' item'+(failed.length>1?'s':'')+' failed.</strong><br>Work Order #'+issNum+' has been automatically created and assigned for follow-up.</div></div>';
    b+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:left;margin-top:14px">';
    failed.forEach(function(f){b+='<div style="padding:6px 0;font-size:14px;display:flex;align-items:center;gap:8px"><span style="color:var(--red);font-weight:700">✗</span>'+esc(f.label)+'</div>';});
    b+='</div>';
  }
  b+='<div style="display:flex;gap:10px;justify-content:center;margin-top:24px">';
  b+='<button class="btn btn-primary" onclick="navTo(\'inspections\')">Done</button>';
  if(!passed)b+='<button class="btn btn-ghost" onclick="openDetail(DB.issues[0].id)">View Work Order →</button>';
  b+='</div></div>';
  document.getElementById('content').innerHTML=b;
}

}

/* ═══════════════════════════════════════════════════════════
   REPORTS
═══════════════════════════════════════════════════════════ */
function buildReports(){
  var iss=DB.issues;
  var closed=iss.filter(function(i){return i.status==='closed';});
  var open=iss.filter(function(i){return i.status!=='closed';});
  var od=iss.filter(function(i){return isOverdue(i);});
  var crit=iss.filter(function(i){return i.prio==='critical'&&i.status!=='closed';});
  var totalCost=iss.reduce(function(s,i){return s+(parseFloat(i.lcost)||0)+(parseFloat(i.pcost)||0);},0);
  var wc=closed.filter(function(i){return i.closed&&i.created;});
  var avgClose=wc.length>0?(wc.reduce(function(s,i){return s+(new Date(i.closed)-new Date(i.created))/86400000;},0)/wc.length).toFixed(1):'—';
  var planned=iss.length>0?Math.round(iss.filter(function(i){return i.type==='preventive'||i.type==='inspection';}).length/iss.length*100):0;

  var b='<div style="margin-bottom:20px"><h2 style="font-size:20px;font-weight:800">Reports & Analytics</h2>';
  b+='<p style="font-size:14px;color:var(--text3);margin-top:2px">Overview of all maintenance activity</p></div>';

  // KPI grid
  b+='<div class="kpi-grid">';
  b+=kpiCard('Total Issues',iss.length,'var(--brand2)','📋','All time','');
  b+=kpiCard('Open',open.length,'var(--orange)','🔧','Needing attention',od.length>0?'<span class="kpi-trend trend-up">'+od.length+' overdue</span>':'<span class="kpi-trend trend-down">0 overdue</span>');
  b+=kpiCard('Avg Close',avgClose+' d','var(--teal)','⏱','Days to resolution','');
  b+=kpiCard('Total Cost','$'+Math.round(totalCost).toLocaleString(),'var(--green-m)','💰','Labor + materials','');
  b+=kpiCard('Closed',closed.length,'var(--green-m)','✅','Completed','');
  b+=kpiCard('Critical',crit.length,'var(--red)','🔴','Needs immediate action','');
  b+=kpiCard('Planned %',planned+'%','var(--purple)','📅','PM vs reactive ratio','');
  b+=kpiCard('Overdue',od.length,'var(--red)','⚠️','Past due date',od.length===0?'<span class="kpi-trend trend-down">All on time!</span>':'');
  b+='</div>';

  function barSec(title,data,color,showBtn){
    var max=Math.max.apply(null,data.map(function(x){return x.v;}).concat([1]));
    var s='<div class="card" style="padding:18px;margin-bottom:14px"><div style="font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:16px">'+title+'</div>';
    if(!data.length)return s+'<div style="color:var(--text4);font-size:13px">No data yet.</div></div>';
    data.forEach(function(x){
      s+='<div class="bar-row"><div class="bar-label" title="'+esc(x.n)+'">'+esc(x.n)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(x.v/max*100)+'%;background:'+color+'"></div></div><div class="bar-count">'+x.v+'</div></div>';
    });
    return s+'</div>';
  }

  var byCat=DB.cats.map(function(c){return{n:c.name,v:iss.filter(function(i){return i.cat===c.id;}).length};}).filter(function(x){return x.v>0;}).sort(function(a,b){return b.v-a.v;}).slice(0,8);
  var byAsset=DB.assets.map(function(a){return{n:a.name,v:iss.filter(function(i){return i.asset===a.id;}).length};}).filter(function(x){return x.v>0;}).sort(function(a,b){return b.v-a.v;}).slice(0,8);
  var byStaff=DB.staff.map(function(s){return{n:s.name,v:iss.filter(function(i){return i.assigned===s.id;}).length};}).filter(function(x){return x.v>0;}).sort(function(a,b){return b.v-a.v;});
  var byType=[{n:'Reactive',v:iss.filter(function(i){return i.type==='reactive';}).length},{n:'Preventive',v:iss.filter(function(i){return i.type==='preventive';}).length},{n:'Inspection',v:iss.filter(function(i){return i.type==='inspection';}).length},{n:'Emergency',v:iss.filter(function(i){return i.type==='emergency';}).length}].filter(function(x){return x.v>0;});

  b+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
  b+=barSec('Issues by Category',byCat,'var(--brand2)');
  b+=barSec('Issues by Location',byAsset,'var(--teal)');
  b+=barSec('Workload by Staff',byStaff,'var(--purple)');
  b+=barSec('By Issue Type',byType,'var(--orange)');
  b+='</div>';

  // Priority breakdown
  b+='<div class="card" style="padding:18px;margin-bottom:14px"><div style="font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:16px">Priority Breakdown</div>';
  b+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">';
  ['low','medium','high','critical'].forEach(function(p){
    var n=iss.filter(function(i){return i.prio===p&&i.status!=='closed';}).length;
    var colors={low:'var(--text3)',medium:'var(--brand2)',high:'var(--amber)',critical:'var(--red)'};
    b+='<div style="text-align:center;padding:14px;background:var(--surface2);border-radius:var(--rs)"><div style="font-size:26px;font-weight:800;font-family:var(--mono);color:'+colors[p]+'">'+n+'</div><div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-top:4px">'+PL[p]+'</div></div>';
  });
  b+='</div></div>';

  return b;
}

function buildSettings(){
  var b='<div style="margin-bottom:20px"><h2 style="font-size:20px;font-weight:800">Settings & Administration</h2></div>';
  b+='<div class="alert alert-info" style="margin-bottom:20px"><span class="alert-icon">💾</span><div><strong>Demo Mode Active.</strong> All data is saved locally in your browser. Nothing is sent to any server. When you\'re ready to go live, connect this to Supabase or any backend.</div></div>';

  // Assets section
  b+='<div class="card" style="margin-bottom:16px">';
  b+='<div style="padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">';
  b+='<div><div style="font-weight:700;font-size:16px">Assets & Locations</div><div style="font-size:13px;color:var(--text3);margin-top:2px">'+DB.assets.length+' active locations</div></div>';
  b+='<button class="btn btn-primary btn-sm" onclick="toggleForm(\'add-asset-form\')">+ Add Asset</button></div>';
  b+='<div id="add-asset-form" style="display:none;padding:18px 20px;border-bottom:1px solid var(--border);background:var(--surface2)">';
  b+='<div class="two-col"><div class="fg"><label class="flabel" style="font-size:12px">Name *</label><input type="text" class="finput" id="sf-aname" placeholder="Asset name" style="font-size:14px;padding:9px 12px"></div>';
  b+='<div class="fg"><label class="flabel" style="font-size:12px">Type</label><select class="fsel" id="sf-atype" style="font-size:14px;padding:9px 12px"><option value="park">Park</option><option value="facility">Facility</option><option value="vehicle">Vehicle</option><option value="equipment">Equipment</option></select></div></div>';
  b+='<div class="fg"><label class="flabel" style="font-size:12px">Address</label><input type="text" class="finput" id="sf-aaddr" placeholder="Street address…" style="font-size:14px;padding:9px 12px"></div>';
  b+='<div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="addAsset()">Save Asset</button><button class="btn btn-ghost btn-sm" onclick="toggleForm(\'add-asset-form\')">Cancel</button></div></div>';
  b+='<div style="padding:0 20px">';
  DB.assets.forEach(function(a){
    var issCount=DB.issues.filter(function(i){return i.asset===a.id&&i.status!=='closed';}).length;
    b+='<div style="display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)">';
    b+='<div><div style="font-weight:600;font-size:14px">'+esc(a.name)+'</div><div style="font-size:12px;color:var(--text3);margin-top:2px;text-transform:capitalize">'+a.type+(a.address?' · '+esc(a.address):'')+'</div></div>';
    b+='<div style="display:flex;align-items:center;gap:10px">';
    if(issCount>0)b+='<span style="font-size:12px;background:var(--amber-l);color:var(--amber);padding:3px 10px;border-radius:20px;font-weight:600">'+issCount+' open</span>';
    b+='<span style="font-size:11px;font-family:var(--mono);color:var(--text4);background:var(--surface2);padding:2px 8px;border-radius:5px;text-transform:capitalize">'+a.type+'</span>';
    b+='</div></div>';
  });
  b+='</div></div>';

  // Staff section
  b+='<div class="card" style="margin-bottom:16px">';
  b+='<div style="padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">';
  b+='<div><div style="font-weight:700;font-size:16px">Staff Directory</div><div style="font-size:13px;color:var(--text3);margin-top:2px">'+DB.staff.length+' team members</div></div>';
  b+='<button class="btn btn-primary btn-sm" onclick="toggleForm(\'add-staff-form\')">+ Add Staff</button></div>';
  b+='<div id="add-staff-form" style="display:none;padding:18px 20px;border-bottom:1px solid var(--border);background:var(--surface2)">';
  b+='<div class="three-col"><div class="fg"><label class="flabel" style="font-size:12px">Full Name *</label><input type="text" class="finput" id="sf-sname" placeholder="Name" style="font-size:14px;padding:9px 12px"></div>';
  b+='<div class="fg"><label class="flabel" style="font-size:12px">Role</label><select class="fsel" id="sf-srole" style="font-size:14px;padding:9px 12px"><option value="staff">Staff</option><option value="technician">Technician</option><option value="supervisor">Supervisor</option><option value="admin">Admin</option></select></div>';
  b+='<div class="fg"><label class="flabel" style="font-size:12px">Email</label><input type="email" class="finput" id="sf-semail" placeholder="email@bgpd.org" style="font-size:14px;padding:9px 12px"></div></div>';
  b+='<div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="addStaff()">Save Staff Member</button><button class="btn btn-ghost btn-sm" onclick="toggleForm(\'add-staff-form\')">Cancel</button></div></div>';
  b+='<div style="padding:0 20px">';
  DB.staff.forEach(function(s){
    var active=DB.issues.filter(function(i){return i.assigned===s.id&&i.status!=='closed';}).length;
    var initials=s.name.split(' ').map(function(n){return n[0];}).join('');
    b+='<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">';
    b+='<div style="width:38px;height:38px;border-radius:50%;background:var(--brand-l);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--brand2);flex-shrink:0">'+esc(initials)+'</div>';
    b+='<div style="flex:1"><div style="font-weight:600;font-size:14px">'+esc(s.name)+'</div><div style="font-size:12px;color:var(--text3);text-transform:capitalize">'+s.role+(s.email?' · '+esc(s.email):'')+'</div></div>';
    b+=active>0?'<span style="font-size:12px;background:var(--amber-l);color:var(--amber);padding:4px 10px;border-radius:20px;font-weight:600">'+active+' active</span>':'<span style="font-size:12px;color:var(--text4)">Available</span>';
    b+='</div>';
  });
  b+='</div></div>';

  // Data management
  b+='<div class="card" style="padding:20px"><div style="font-weight:700;font-size:16px;margin-bottom:14px">Data Management</div>';
  b+='<div style="display:flex;gap:10px;flex-wrap:wrap">';
  b+='<button class="btn btn-ghost btn-sm" onclick="exportData()">⬇ Export All Data (JSON)</button>';
  b+='<button class="btn btn-danger btn-sm" onclick="if(confirm(\'Reset ALL data to demo defaults? This cannot be undone.\'))resetData()">⚠ Reset to Demo Data</button>';
  b+='</div></div>';
  return b;
}

function addAsset(){
  var name=((document.getElementById('sf-aname')||{}).value||'').trim();
  if(!name)return;
  DB.assets.push({id:uid(),name:name,type:(document.getElementById('sf-atype')||{}).value||'park',address:(document.getElementById('sf-aaddr')||{}).value||'',qr:uid(),active:true});
  saveDB(DB);renderPage('settings');
}
function addStaff(){
  var name=((document.getElementById('sf-sname')||{}).value||'').trim();
  if(!name)return;
  DB.staff.push({id:uid(),name:name,role:(document.getElementById('sf-srole')||{}).value||'staff',email:(document.getElementById('sf-semail')||{}).value||'',active:true});
  saveDB(DB);renderPage('settings');
}
function exportData(){
  var blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='bgpd-maintenance-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);
}
function resetData(){localStorage.removeItem(DB_KEY);initDB();location.reload();}

/* ═══════════════════════════════════════════════════════════
   GLOBAL SEARCH
═══════════════════════════════════════════════════════════ */
var searchTimer=null;
function globalSearch(q){
  clearTimeout(searchTimer);
  if(!q||q.length<2){closeSearch();return;}
  searchTimer=setTimeout(function(){doSearch(q);},250);
}
function doSearch(q){
  var ql=q.toLowerCase();
  var results=DB.issues.filter(function(i){
    return String(i.num).includes(ql)||i.summary.toLowerCase().includes(ql)||
      aName(i.asset).toLowerCase().includes(ql)||(i.by||'').toLowerCase().includes(ql)||
      (i.loc||'').toLowerCase().includes(ql)||(i.desc||'').toLowerCase().includes(ql);
  });
  document.getElementById('search-count').textContent=results.length+' result'+(results.length!==1?'s':'')+' for "'+esc(q)+'"';
  var b='';
  if(results.length===0){b='<div class="empty" style="padding:30px"><span class="empty-icon" style="font-size:36px">🔍</span><div class="empty-title" style="font-size:16px">No results</div></div>';}
  else results.forEach(function(i){b+=miniIssueCard(i)+'\n';});
  document.getElementById('search-results-body').innerHTML=b;
  document.getElementById('search-results-overlay').classList.remove('hidden');
}
function closeSearch(){
  document.getElementById('search-results-overlay').classList.add('hidden');
  var gs=document.getElementById('global-search');
  if(gs)gs.value='';
  var ms=document.getElementById('mobile-search');
  if(ms)ms.value='';
}

/* ═══════════════════════════════════════════════════════════
   ROLE
═══════════════════════════════════════════════════════════ */
function setRole(r){
  currentRole=r;
  var names={staff:'Dave Martinez',technician:'Tom Garcia',supervisor:'Sarah Williams',admin:'Mike Johnson'};
  document.getElementById('sb-uname').textContent=names[r]||r;
  document.getElementById('sb-urole').textContent=r;
  var inits=names[r]?names[r].split(' ').map(function(n){return n[0];}).join(''):'?';
  document.getElementById('sb-avatar-init').textContent=inits;
  document.getElementById('new-btn').style.display=(currentTab==='issues'||currentTab==='dashboard')?'':'none';
  renderPage(currentTab);
}

/* ═══════════════════════════════════════════════════════════
   SIDEBAR MOBILE TOGGLE
═══════════════════════════════════════════════════════════ */
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');}
function toggleMobileSearch(){
  var bar=document.getElementById('mobile-search-bar');
  bar.classList.toggle('hidden');
  if(!bar.classList.contains('hidden'))setTimeout(function(){document.getElementById('mobile-search').focus();},50);
}

/* ═══════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════════════════ */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    closeSearch();
    closeDetailModal();
    var no=document.getElementById('new-issue-overlay');if(no)no.remove();
    var ao=document.getElementById('assign-overlay');if(ao)ao.remove();
    closeSidebar();
  }
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){
    e.preventDefault();
    var gs=document.getElementById('global-search');
    if(gs){gs.focus();gs.select();}
  }
  if((e.metaKey||e.ctrlKey)&&e.key==='n'){
    e.preventDefault();
    openNewIssue();
  }
});

// Close sidebar on outside click (mobile)
document.addEventListener('click',function(e){
  var sb=document.getElementById('sidebar');
  if(sb&&sb.classList.contains('open')&&!sb.contains(e.target)&&!e.target.closest('.topbar'))closeSidebar();
});

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
initDB();
loadAll();
</script>
