<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1a6fbb"/>
<title>BGPD Maintenance</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1a6fbb;--blue-d:#145899;--blue-l:#e8f1fb;
  --green:#16a34a;--green-l:#dcfce7;
  --red:#dc2626;--red-l:#fee2e2;
  --amber:#b45309;--amber-l:#fef3c7;
  --orange:#c2410c;--orange-l:#ffedd5;
  --purple:#7c3aed;--purple-l:#ede9fe;
  --teal:#0d9488;--teal-l:#ccfbf1;
  --bg:#f4f6fa;--surface:#fff;--surface2:#f8f9fb;
  --border:#e2e6ee;--border2:#cdd3df;
  --text:#111827;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
  --nav-h:64px;--top-h:56px;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','Courier New',monospace;
  --r:12px;--rs:8px;
  --shadow:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 20px rgba(0,0,0,.12);
}
/* CRITICAL: Don't use height:100%/overflow:hidden on html/body in iframes */
html{min-height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;min-height:100vh}
#root{min-height:100vh}
/* TOP BAR */
.topbar{background:var(--blue);color:#fff;padding:0 16px;height:var(--top-h);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:30;box-shadow:0 2px 8px rgba(26,111,187,.3)}
.tb-logo{background:rgba(255,255,255,.2);font-size:11px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:6px;white-space:nowrap}
.tb-title{font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.tb-sub{font-size:12px;opacity:.75}
.icon-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}
.icon-btn:active{background:rgba(255,255,255,.3)}
/* SCROLL — natural flow on mobile, no fixed height */
.scroll-area{padding-bottom:calc(var(--nav-h) + 20px)}
/* BOTTOM NAV — fixed to viewport bottom */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;background:none;border:none;font-family:var(--font);color:var(--text4);font-size:10px;font-weight:500;padding:8px 4px;position:relative}
.nav-item.active{color:var(--blue)}
.nav-icon{font-size:22px;line-height:1}
.nav-badge{position:absolute;top:6px;right:calc(50% - 16px);background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;min-width:16px;text-align:center}
.nav-badge.amb{background:var(--amber)}
/* FAB */
.fab{position:fixed;bottom:calc(var(--nav-h) + 16px);right:16px;z-index:40;width:56px;height:56px;background:var(--blue);color:#fff;border:none;border-radius:50%;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(26,111,187,.45);transition:transform .15s}
.fab:active{transform:scale(.92)}
/* PAGE */
.page{padding:12px 14px}
/* CARDS */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
/* ISSUE CARDS */
.issue-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);padding:14px 16px;cursor:pointer;transition:all .15s;-webkit-user-select:none}
.issue-card:active{transform:scale(.98);background:#f0f7ff}
.issue-card+.issue-card{margin-top:8px}
.issue-card.overdue{border-left:4px solid var(--red);background:#fffafa}
.issue-card.unassigned{border-left:4px solid #f59e0b;background:#fffbeb}
.ic-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.ic-num{font-family:var(--mono);font-size:11px;color:var(--blue);font-weight:500}
.ic-summary{font-size:15px;font-weight:600;line-height:1.3;flex:1}
.ic-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.ic-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:6px}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.bd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-open{background:var(--blue-l);color:var(--blue)}.badge-open .bd{background:var(--blue)}
.badge-assigned{background:var(--amber-l);color:var(--amber)}.badge-assigned .bd{background:#f59e0b}
.badge-in_progress{background:var(--orange-l);color:var(--orange)}.badge-in_progress .bd{background:#f97316}
.badge-review{background:var(--purple-l);color:var(--purple)}.badge-review .bd{background:var(--purple)}
.badge-closed{background:var(--green-l);color:var(--green)}.badge-closed .bd{background:var(--green)}
.type-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase}
.type-reactive{background:#f1f5f9;color:#475569}
.type-preventive{background:var(--teal-l);color:var(--teal)}
.type-inspection{background:#e0e7ff;color:#4338ca}
.type-emergency{background:var(--red-l);color:var(--red)}
.prio-tag{font-size:11px;font-weight:700;text-transform:uppercase}
.prio-low{color:var(--text4)}.prio-medium{color:var(--blue)}.prio-high{color:var(--amber)}.prio-critical{color:var(--red)}
/* STAT STRIP */
.stat-strip{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 4px;scrollbar-width:none}
.stat-strip::-webkit-scrollbar{display:none}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;flex-shrink:0;cursor:pointer;transition:all .15s;border-top:3px solid transparent;min-width:90px;text-align:center}
.stat-chip.active{box-shadow:0 0 0 2px var(--blue);border-top-color:var(--blue)}
.stat-chip:active{transform:scale(.95)}
.sc-num{font-size:24px;font-weight:700;font-family:var(--mono);line-height:1}
.sc-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-top:2px}
.sc-open .sc-num{color:var(--blue)}
.sc-assigned .sc-num{color:#d97706}
.sc-in_progress .sc-num{color:var(--orange)}
.sc-review .sc-num{color:var(--purple)}
.sc-closed .sc-num{color:var(--green)}
.sc-overdue .sc-num{color:var(--red)}
/* FULLSCREEN overlays */
.fullscreen{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.fs-topbar{background:var(--blue);color:#fff;padding:0 16px;height:var(--top-h);display:flex;align-items:center;gap:12px;flex-shrink:0}
.fs-title{font-size:17px;font-weight:600;flex:1}
.fs-sub{font-size:12px;opacity:.75;margin-top:1px}
.fs-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.fs-footer{padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
/* STEP BAR */
.step-bar{display:flex;background:rgba(255,255,255,.2);flex-shrink:0}
.step-seg{flex:1;height:4px;transition:background .3s}
.step-seg.done{background:#fff}.step-seg.todo{background:rgba(255,255,255,.3)}
/* TABS */
.tab-row{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:max-content;padding:12px 14px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text3);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
/* DETAIL SECTIONS */
.detail-sec{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);margin:10px 14px;overflow:hidden}
.detail-sec-hdr{padding:12px 16px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2)}
.detail-sec-body{padding:14px 16px}
/* ASSIGN BANNER */
.assign-banner{margin:10px 14px;border-radius:var(--r);padding:14px 16px;display:flex;gap:12px;align-items:flex-start;border:1.5px solid}
.assign-banner.unassigned{background:var(--blue-l);border-color:#93c5fd}
.assign-banner.assigned{background:var(--green-l);border-color:#86efac}
.ab-icon{font-size:26px;flex-shrink:0;margin-top:2px}
.ab-body{flex:1}
.ab-title{font-weight:700;font-size:15px}
.ab-sub{font-size:13px;color:var(--text3);margin-top:2px}
.ab-actions{margin-top:10px}
/* STATUS FLOW */
.status-flow{display:flex;overflow-x:auto;gap:4px;padding:2px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.status-flow::-webkit-scrollbar{display:none}
.sf-step{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;border:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s}
.sf-step.done{background:var(--green-l);color:var(--green);border-color:var(--green)}
.sf-step.current{background:var(--blue-l);color:var(--blue);border-color:var(--blue)}
.sf-step.todo{background:var(--surface2);color:var(--text3);border-color:var(--border2)}
.sf-step.todo:active{border-color:var(--blue);color:var(--blue)}
.sf-arrow{flex-shrink:0;color:var(--text4);font-size:12px;align-self:center}
/* META */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text4);margin-bottom:2px}
.mi-value{font-size:14px;font-weight:500}
/* TIMELINE */
.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.tl-body{flex:1;font-size:14px;color:var(--text2)}
.tl-time{font-size:12px;color:var(--text4);margin-top:2px}
/* CHECKLIST */
.ci-item{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.ci-item:last-child{border-bottom:none}
.ci-label{flex:1;font-size:14px;color:var(--text2);line-height:1.4}
/* BOTTOM SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(10,15,28,.5);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(3px)}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:env(safe-area-inset-bottom)}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 4px}
.sheet-hdr{padding:8px 18px 14px;border-bottom:1px solid var(--border)}
.sheet-hdr h3{font-size:17px;font-weight:700}
.sheet-hdr p{font-size:13px;color:var(--text3);margin-top:2px}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px}
.sheet-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px}
/* FORM */
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.flabel{font-size:13px;font-weight:600;color:var(--text2)}
.req{color:var(--red)}
.finput,.fsel,.ftextarea{width:100%;padding:13px 14px;border:1.5px solid var(--border2);border-radius:var(--rs);font-family:var(--font);font-size:16px;color:var(--text);background:#fff;-webkit-appearance:none;outline:none;transition:border .15s}
.finput:focus,.fsel:focus,.ftextarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.ftextarea{resize:none;min-height:100px;line-height:1.6}
.fhint{font-size:12px;color:var(--text4)}
/* TYPE TOGGLE */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.type-btn{padding:12px 10px;border:2px solid var(--border2);border-radius:var(--rs);background:var(--surface2);cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text2);text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s}
.type-btn .tb-icon{font-size:22px}
.type-btn.active{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.type-btn.active.emerg{border-color:var(--red);background:var(--red-l);color:var(--red)}
.type-btn:active{transform:scale(.96)}
/* PRIO */
.prio-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.prio-btn{padding:10px 4px;border:2px solid var(--border2);border-radius:var(--rs);background:var(--surface2);cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;text-align:center;transition:all .15s}
.prio-btn.sel-low{border-color:var(--text3);background:#f9fafb;color:var(--text2)}
.prio-btn.sel-medium{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.prio-btn.sel-high{border-color:var(--amber);background:var(--amber-l);color:var(--amber)}
.prio-btn.sel-critical{border-color:var(--red);background:var(--red-l);color:var(--red)}
/* UPLOAD */
.upload-btn{display:flex;align-items:center;gap:10px;padding:14px 16px;border:2px dashed var(--border2);border-radius:var(--rs);background:var(--surface2);cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);width:100%;text-align:left}
.upload-btn:active{background:var(--blue-l);border-color:var(--blue)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{background:var(--blue-l);border:1px solid #bfdbfe;border-radius:20px;padding:4px 12px;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:6px}
.chip button{background:none;border:none;cursor:pointer;color:var(--blue);font-size:16px;line-height:1;padding:0}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--rs);font-family:var(--font);font-size:16px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;-webkit-user-select:none}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:active{background:var(--blue-d)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border2)}.btn-secondary:active{background:var(--border)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red-l);color:var(--red);border:1px solid #fca5a5}
.btn-ghost{background:none;color:var(--text3);border:1.5px solid var(--border)}.btn-ghost:active{background:var(--surface2)}
.btn-sm{padding:9px 14px;font-size:14px}
.btn-xs{padding:7px 11px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-full{width:100%}
/* PM */
.pm-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:center}
.pm-card+.pm-card{margin-top:8px}
.pm-icon-wrap{width:44px;height:44px;border-radius:10px;background:var(--teal-l);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pm-info{flex:1;min-width:0}
.pm-title{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pm-meta{font-size:12px;color:var(--text3);margin-top:2px}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.kpi{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;text-align:center}
.kpi-val{font-size:28px;font-weight:700;font-family:var(--mono)}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-top:4px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--text2);min-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;background:var(--surface2);border-radius:4px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.bar-count{font-size:12px;color:var(--text3);min-width:22px;text-align:right}
/* ALERTS */
.alert{padding:12px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;border:1px solid}
.alert-info{background:var(--blue-l);color:var(--blue-d);border-color:#bfdbfe}
.alert-warn{background:var(--amber-l);color:var(--amber);border-color:#fde68a}
.alert-success{background:var(--green-l);color:var(--green);border-color:#86efac}
/* SEARCH */
.search-wrap{padding:0 14px 8px;position:relative}
.search-wrap svg{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--text4);pointer-events:none}
.search-input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--border2);border-radius:var(--rs);font-family:var(--font);font-size:16px;background:var(--surface);color:var(--text);outline:none}
.search-input:focus{border-color:var(--blue)}
/* EMPTY */
.empty{text-align:center;padding:56px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;margin-bottom:6px}
.empty-sub{font-size:14px;color:var(--text3);line-height:1.5}
/* LOADING */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--blue-l);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* DESKTOP */
@media(min-width:700px){
  .mobile-only{display:none!important}
  #root{display:flex;flex-direction:row;min-height:100vh}
  .sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
  .sb-badge{background:var(--blue);color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:8px}
  .sb-name{font-size:16px;font-weight:700}
  .sb-sub{font-size:11px;color:var(--text3);margin-top:2px}
  .sb-sec{padding:10px 10px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text4)}
  .sb-nav{padding:6px 8px;display:flex;flex-direction:column;gap:1px}
  .sb-item{display:flex;align-items:center;gap:9px;padding:10px;border-radius:7px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);border:none;background:none;width:100%;text-align:left;transition:all .15s}
  .sb-item:hover{background:var(--blue-l);color:var(--blue)}
  .sb-item.active{background:var(--blue-l);color:var(--blue);font-weight:600}
  .sb-cnt{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:20px;text-align:center}
  .sb-cnt.amb{background:var(--amber)}
  .sb-role{padding:12px;border-top:1px solid var(--border);margin-top:auto}
  .sb-role label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text4);display:block;margin-bottom:5px}
  .sb-role select{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:6px;font-family:var(--font);font-size:12px;cursor:pointer}
  .desktop-main{flex:1;display:flex;flex-direction:column;min-width:0}
  .desktop-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40;box-shadow:var(--shadow)}
  .desktop-content{flex:1;padding:20px 24px}
  .scroll-area{padding-bottom:20px}
  .fullscreen{position:fixed}
  .fab{bottom:24px;right:24px}
  .page{padding:0}
  .stat-strip{padding:0 0 8px}
  .search-wrap{padding:0 0 8px}
  .search-wrap svg{left:12px}
  .bottom-nav{display:none}
}
@media(max-width:699px){
  .desktop-only{display:none!important}
  .sidebar{display:none!important}
  .desktop-main{display:none!important}
}
</style>
